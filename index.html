<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IP Invaders FULL - Expert Edition</title>

<style>
body {
  margin: 0;
  background: black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: monospace;
}

canvas {
  background:black;
  border:4px solid #00ffcc;
  box-shadow:0 0 20px #00ffcc;
  display:none;
}

#menu {
  color:#00ffcc;
  text-align:center;
}

input {
  background:black;
  border:2px solid #00ffcc;
  color:#00ffcc;
  font-size:18px;
  padding:8px;
  text-align:center;
  margin-top:10px;
}

button {
  margin-top:15px;
  padding:10px 20px;
  background:black;
  border:2px solid #00ffcc;
  color:#00ffcc;
  cursor:pointer;
  font-size:18px;
}
button:hover {
  background:#00ffcc;
  color:black;
}
</style>
</head>
<body>

<div id="menu">
  <h1>👾 IP INVADERS</h1>
  <p>Introduce tu nombre</p>
  <input id="playerName" placeholder="PLAYER 1">
  <br>
  <button onclick="startGame()">START</button>
</div>

<canvas id="gameCanvas" width="900" height="650"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- PLAYER NAME ---
let playerName = "PLAYER";

// --- START GAME ---
function startGame(){
  playerName = document.getElementById("playerName").value || "PLAYER";
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  spawnEnemies();
  loop();
}

// --- AUDIO FIX ---
let audioCtx;
function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}
function playSound(f,d){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value=f;
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+d);
  o.stop(audioCtx.currentTime+d);
}

// --- GAME STATE ---
let player = {x:430,y:600,w:40,h:20,speed:6};
let bullets=[];
let enemies=[];

let direction=1;
let enemySpeed=1.2; 

let score=0;
let lives=3;
let level=1;

let flash=0;
let gameOver=false;

// --- INPUT ---
let keys={};
document.addEventListener("keydown",e=>{
  initAudio();
  keys[e.key]=true;
  if(e.key===" ") shoot();
});
document.addEventListener("keyup",e=>keys[e.key]=false);

// --- QUESTIONS (NUEVAS CATEGORÍAS AGREGADAS) ---
function generateQuestion(){
  const mode = Math.floor(Math.random() * 3); // 0: Tipo, 1: Clase, 2: Máscara
  let qPool = [];
  let opts = [];
  let prefix = "";

  if(mode === 0) { 
    // MODO: PRIVADA / PÚBLICA / LOOPBACK
    prefix = "IP: ";
    opts = ["Privada", "Pública", "Loopback"];
    qPool = [
      {ip:"192.168.1.50",correct:"Privada"}, {ip:"10.0.0.1",correct:"Privada"},
      {ip:"172.16.10.2",correct:"Privada"}, {ip:"8.8.4.4",correct:"Pública"},
      {ip:"1.1.1.1",correct:"Pública"}, {ip:"127.0.0.1",correct:"Loopback"},
      {ip:"127.255.255.254",correct:"Loopback"}, {ip:"45.23.1.8",correct:"Pública"}
    ];
  } else if (mode === 1) {
    // MODO: CLASES A, B, C
    prefix = "CLASE DE: ";
    opts = ["Clase A", "Clase B", "Clase C"];
    qPool = [
      {ip:"10.20.30.40",correct:"Clase A"}, {ip:"126.1.1.1",correct:"Clase A"},
      {ip:"128.0.0.5",correct:"Clase B"}, {ip:"172.31.2.1",correct:"Clase B"},
      {ip:"191.255.0.0",correct:"Clase B"}, {ip:"192.168.1.1",correct:"Clase C"},
      {ip:"223.255.255.0",correct:"Clase C"}, {ip:"200.10.10.1",correct:"Clase C"}
    ];
  } else {
    // MODO: MÁSCARAS DE RED
    prefix = "MÁSCARA DE: ";
    opts = ["255.0.0.0", "255.255.0.0", "255.255.255.0"];
    qPool = [
      {ip:"10.0.0.1",correct:"255.0.0.0"}, {ip:"45.0.0.1",correct:"255.0.0.0"},
      {ip:"172.16.0.1",correct:"255.255.0.0"}, {ip:"150.10.5.5",correct:"255.255.0.0"},
      {ip:"192.168.10.10",correct:"255.255.255.0"}, {ip:"210.1.1.1",correct:"255.255.255.0"}
    ];
  }

  const picked = qPool[Math.floor(Math.random() * qPool.length)];
  return {
    ip: prefix + picked.ip,
    correct: picked.correct,
    options: opts
  };
}

let currentQ=generateQuestion();

// --- ENEMIES ---
function spawnEnemies(){
  enemies=[];
  currentQ.options.forEach((o,i)=>{
    enemies.push({
      x:200+i*180,
      y:120,
      w:140,
      h:50,
      text:o
    });
  });
}

// --- SHOOT ---
function shoot(){
  bullets.push({x:player.x+20,y:player.y,speed:8});
  playSound(600,0.1);
}

// --- UPDATE ---
function update(){
  if(gameOver) return;

  if(keys["ArrowLeft"]) player.x-=player.speed;
  if(keys["ArrowRight"]) player.x+=player.speed;

  player.x=Math.max(0,Math.min(860,player.x));

  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].y-=bullets[i].speed;
    if(bullets[i].y<0) bullets.splice(i,1);
  }

  let hit=false;
  enemies.forEach(e=>{
    e.x+=enemySpeed*direction;
    if(e.x<20||e.x+e.w>880) hit=true;
  });

  if(hit){
    direction*=-1;
    enemies.forEach(e=>e.y+=(15 + level * 2)); 
  }

  for(let bi=bullets.length-1;bi>=0;bi--){
    for(let ei=enemies.length-1;ei>=0;ei--){
      let b=bullets[bi],e=enemies[ei];
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        checkAnswer(e.text);
        bullets.splice(bi,1);
        return;
      }
    }
  }

  enemies.forEach(e => {
    if(e.y + e.h > player.y) {
        lives = 0;
        checkAnswer("GAME_OVER_TRIGGER");
    }
  });

  if(flash!==0) flash += (flash>0?-1:1);
}

// --- CHECK ---
function checkAnswer(ans){
  if(ans===currentQ.correct){
    score+=20;
    flash=10;
    playSound(900,0.1);
    level++;
    enemySpeed += 0.35; 
  } else {
    lives--;
    flash=-10;
    playSound(200,0.2);
  }

  if(lives<=0){
    gameOver=true;
    saveScore();
  } else {
    currentQ=generateQuestion();
    spawnEnemies();
  }
}

// --- RANKING ---
function saveScore(){
  let data=JSON.parse(localStorage.getItem("ipInvaders"))||[];
  data.push({name:playerName,score});
  data.sort((a,b)=>b.score-a.score);
  data=data.slice(0,5);
  localStorage.setItem("ipInvaders",JSON.stringify(data));
}

// --- DRAW ---
function drawText(t,x,y,s=20,c="#0f0",a="center"){
  ctx.fillStyle=c;
  ctx.font=s+"px monospace";
  ctx.textAlign=a;
  ctx.fillText(t,x,y);
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,900,650);

  if(flash>0){
    ctx.fillStyle="rgba(0,255,0,0.2)";
    ctx.fillRect(0,0,900,650);
  }
  if(flash<0){
    ctx.fillStyle="rgba(255,0,0,0.2)";
    ctx.fillRect(0,0,900,650);
  }

  ctx.fillStyle="#00ffcc"; 
  ctx.fillRect(player.x,player.y,player.w,player.h);

  ctx.fillStyle="yellow";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,10));

  enemies.forEach(e=>{
    ctx.strokeStyle="#0f0";
    ctx.strokeRect(e.x,e.y,e.w,e.h);
    drawText(e.text,e.x+70,e.y+30,16); // Ajustado tamaño texto enemigos
  });

  drawText(currentQ.ip,450,60,30, "#fff"); // Muestra la pregunta arriba
  drawText("PLAYER: "+playerName,20,30,18,"#0f0","left");
  drawText("SCORE: "+score,20,60,18,"#0f0","left");
  drawText("LIVES: "+lives,20,90,18,"#0f0","left");
  drawText("LEVEL: "+level,20,120,18,"#0f0","left");

  if(gameOver){
    drawText("GAME OVER",450,250,50,"red");
    let data=JSON.parse(localStorage.getItem("ipInvaders"))||[];
    data.forEach((d,i)=>{
      drawText((i+1)+". "+d.name+" - "+d.score,450,320+i*30,20);
    });
  }
}

// --- LOOP ---
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>

</body>
</html>
