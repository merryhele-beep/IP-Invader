<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #000;

}
canvas {
  background: #000; border: 2px solid #00ffcc;

}
#menu {
  color: #00ffcc; text-align: center; padding: 26px 30px;

}

}
@keyframes glow {
  0%,100% { text-shadow: 0 0 8px #00ffcc; }

}

  margin-top: 14px; padding: 11px 28px; background: #000;

  transition: all 0.15s; display: block; width: 200px;

.btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0,255,204,0.5); }
.diff-row { display: flex; justify-content: center; gap: 6px; margin-top: 14px; }
.diff-btn {

  font-size: 11px; color: #444; letter-spacing: 1px;
}
#menu-top3 .trow { margin: 3px 0; color: #556; }

.hint {

  letter-spacing: 1px; border-top: 1px solid #111; padding-top: 12px;

.hint span { color: #555; }

  justify-content: space-between; align-items: center; padding: 10px 20px;

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() { if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
function playTone(f,d,t="square",v=0.15) {
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=t; o.frequency.value=f;
  g.gain.setValueAtTime(v,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
}
function sfxShoot()   { playTone(700,0.08,"square",0.12); }
function sfxHit()     { playTone(1100,0.12,"sine",0.2); setTimeout(()=>playTone(900,0.08,"sine",0.15),60); }
function sfxMiss()    { playTone(120,0.3,"sawtooth",0.18); }
function sfxBomb()    { playTone(80,0.4,"sawtooth",0.2); }
function sfxLevelUp() { [900,1100,1300].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,"sine",0.2),i*80)); }
function sfxBoss()    { [200,250,300,250,200].forEach((f,i)=>setTimeout(()=>playTone(f,0.15,"sawtooth",0.25),i*90)); }
function sfxCombo()   { playTone(1400,0.08,"sine",0.15); setTimeout(()=>playTone(1600,0.1,"sine",0.18),80); }
function sfxTimeout() { [300,200,100].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,"sawtooth",0.2),i*80)); }
function sfxSkin()    { [600,800,1000,1200].forEach((f,i)=>setTimeout(()=>playTone(f,0.1,"sine",0.2),i*70)); }

function getBestScore() { try{return parseInt(localStorage.getItem("ipBest")||"0");}catch(e){return 0;} }
function saveBestScore() { try{if(score>getBestScore())localStorage.setItem("ipBest",score);}catch(e){} }
function getActiveSkin() {
  // Use the highest skin earned either from best score OR current session
  const effective = Math.max(getBestScore(), score);
  let s=SKINS[0]; for(const sk of SKINS){if(effective>=sk.minBest)s=sk;} return s;
}
function nextSkin() {
  const effective = Math.max(getBestScore(), score);
  return SKINS.find(sk => effective < sk.minBest) || null;
}

  starsNear = Array.from({length:55},()=>({x:Math.random()*900,y:Math.random()*620,sz:1.4+Math.random()*.8,sp:.35+Math.random()*.3,br:.4+Math.random()*.5}));

}

function updateStars() {
  starsNear.forEach(s=>{s.y+=s.sp;if(s.y>620){s.y=-2;s.x=Math.random()*900;}});
  starsFar.forEach( s=>{s.y+=s.sp;if(s.y>620){s.y=-2;s.x=Math.random()*900;}});
}
function drawStars() {
  starsFar.forEach( s=>{ctx.fillStyle=`rgba(160,190,255,${s.br})`;ctx.fillRect(s.x,s.y,s.sz,s.sz);});
  starsNear.forEach(s=>{ctx.fillStyle=`rgba(220,235,255,${s.br})`;ctx.fillRect(s.x,s.y,s.sz,s.sz);});
}

// ── EXPLOSIONS ────────────────────────────────────────────────────────────────
function spawnExplosion(x,y,big=false) { explosions.push({x,y,f:0,mf:big?35:20,big}); }
function updateExplosions() { for(let i=explosions.length-1;i>=0;i--){if(++explosions[i].f>=explosions[i].mf)explosions.splice(i,1);} }
function drawExplosions() {
  explosions.forEach(e=>{
    const t=e.f/e.mf, a=1-t, r=e.big?80:55;
    ctx.lineWidth=2.5*(1-t*.5);
    ctx.strokeStyle=`rgba(255,210,0,${a*.9})`; ctx.beginPath(); ctx.arc(e.x,e.y,t*r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(255,80,0,${a*.7})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(e.x,e.y,t*r*.6,0,Math.PI*2); ctx.stroke();
    const n=e.big?12:8;
    for(let i=0;i<n;i++){const ag=(Math.PI*2/n)*i,d=t*(e.big?70:48);ctx.fillStyle=`rgba(255,230,80,${a})`;ctx.fillRect(e.x+Math.cos(ag)*d-2,e.y+Math.sin(ag)*d-2,4,4);}
  });
}

// ── FLOATING TEXTS ────────────────────────────────────────────────────────────
function spawnFT(x,y,txt,color="#ffff00",sz=19) { floatTxts.push({x,y,txt,color,sz,life:1,vy:-1.8}); }
function updateFT() { for(let i=floatTxts.length-1;i>=0;i--){floatTxts[i].y+=floatTxts[i].vy;floatTxts[i].life-=.028;if(floatTxts[i].life<=0)floatTxts.splice(i,1);} }
function drawFT() {
  floatTxts.forEach(f=>{ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle=f.color;ctx.font=`bold ${f.sz}px 'Courier New',monospace`;ctx.textAlign="center";ctx.fillText(f.txt,f.x,f.y);});
  ctx.globalAlpha=1;
}

// ── BONUS HEARTS ──────────────────────────────────────────────────────────────
function spawnHeart() { bHearts.push({x:100+Math.random()*700,y:-35,vy:2.2,life:1,wb:Math.random()*Math.PI*2}); }
function updateHearts() {
  for(let i=bHearts.length-1;i>=0;i--){
    const h=bHearts[i]; h.y+=h.vy; h.wb+=.08; h.x+=Math.sin(h.wb)*.8;
    if(h.y>560)h.life-=.06; if(h.life<=0)bHearts.splice(i,1);
  }
}
function drawHeart(x,y,s,a) {
  ctx.globalAlpha=Math.max(0,a); ctx.fillStyle="#ff55aa";
  ctx.beginPath();
  ctx.moveTo(x,y+s*.35);
  ctx.bezierCurveTo(x,y+s*.05,x-s,y+s*.05,x-s,y+s*.35);
  ctx.bezierCurveTo(x-s,y+s*.65,x,y+s*.9,x,y+s);
  ctx.bezierCurveTo(x,y+s*.9,x+s,y+s*.65,x+s,y+s*.35);
  ctx.bezierCurveTo(x+s,y+s*.05,x,y+s*.05,x,y+s*.35);
  ctx.closePath(); ctx.fill();
  ctx.font="bold 11px 'Courier New',monospace"; ctx.fillStyle="#fff"; ctx.textAlign="center";
  ctx.fillText("+1",x,y+s*.7); ctx.globalAlpha=1;
}
function drawHearts() { bHearts.forEach(h=>drawHeart(h.x,h.y,16,h.life)); }

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParts(x,y,color,n=12) {
  for(let i=0;i<n;i++){
    const ag=(Math.PI*2/n)*i+Math.random()*.4, sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ag)*sp,vy:Math.sin(ag)*sp,life:1,decay:.04+Math.random()*.04,sz:2+Math.random()*3,color});
  }
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetGame() {
  const d=DIFF[difficulty];
  player={x:430,y:570,w:44,h:18,speed:6};
  bullets=[]; bombs=[]; enemies=[]; shields=[]; particles=[];
  explosions=[]; floatTxts=[]; bHearts=[];
  initStars();
  direction=1; enemySpeed=d.baseSpeed;
  score=0; lives=3; level=1; nextBonusLife=200;
  flash=0; shakeX=0; shakeY=0;
  eBombTimer=d.bombRate; usedQs=new Set();
  combo=0; maxCombo=0; statOK=0; statNG=0;
  revealTimer=0; lastCorrect="";
  qTimer=d.timerMax; qTimerMax=d.timerMax;
  isBossWave=false; bossHp=0; skinMsg="";
  shootCd=0; levelUpTimer=0; levelUpNum=1; bossIntroTimer=0; sessionSkin=0;
  powerups=[]; rapidTimer=0; shieldActive=false; x2Active=false; formation=0;

// ── QUESTIONS ─────────────────────────────────────────────────────────────────
function pickQ() {
  if(usedQs.size>=QUESTIONS.length) usedQs.clear();
  let i; do{i=Math.floor(Math.random()*QUESTIONS.length);}while(usedQs.has(i));
  usedQs.add(i); return QUESTIONS[i];
}

// ── ENEMIES ───────────────────────────────────────────────────────────────────
function spawnEnemies() {
  enemies=[]; const opts=currentQ.opts;
  const tw=opts.length*160, sx=(900-tw)/2+10;
  const baseY=isBossWave?132:110;
  // Formation offsets: 0=line, 1=stagger, 2=V-shape
  const offsets=[
    [0,0,0],
    [-22,22,-22],
    [-30,0,-30],
  ];
  const off=offsets[isBossWave?0:formation%3];
  opts.forEach((o,i)=>{
    enemies.push({
      x:sx+i*160, y:baseY+(off[i]||0),
      w:isBossWave?160:145, h:isBossWave?58:48,
      text:o, pulse:Math.random()*Math.PI*2, boss:isBossWave
    });
  });
  if(!isBossWave) formation++;
}

// ── SHIELDS ───────────────────────────────────────────────────────────────────
const SC=8,SR=3,SS=10;
function buildShields() {
  shields=[]; [160,390,620].forEach(sx=>{
    for(let r=0;r<SR;r++) for(let c=0;c<SC;c++) shields.push({x:sx+c*SS,y:490+r*SS,alive:true});
  });
}

function shoot() {

// ── BOSS ──────────────────────────────────────────────────────────────────────
function startBossWave() {
  isBossWave=true;
  bossHp=3+Math.floor(level/5); bossMaxHp=bossHp;
  bossIntroTimer=150; // 2.5s freeze for boss intro
  sfxBoss();

// ── UPDATE ────────────────────────────────────────────────────────────────────
function update() {
  if(state!=="playing") return;
  if(shootCd>0) shootCd--;
  if(levelUpTimer>0) levelUpTimer--;
  if(bossIntroTimer>0){ bossIntroTimer--; return; } // freeze during boss intro

  // Reveal freeze
  if(revealTimer>0){revealTimer--;return;}

  // Question timer
  qTimer--;
  if(qTimer<=0){
    sfxTimeout(); combo=0;
    spawnFT(450,200,"TIEMPO!","#ff4400",26);
    loseLife();
    if(state==="playing"){currentQ=pickQ();spawnEnemies();qTimer=qTimerMax;}
    return;
  }

  // Movement
  if(keys["ArrowLeft"])  player.x-=player.speed;
  if(keys["ArrowRight"]) player.x+=player.speed;
  player.x=Math.max(2,Math.min(854,player.x));

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    bullets[i].y-=bullets[i].speed;
    if(bullets[i].y<0){bullets.splice(i,1);continue;}
    let sh=false;
    for(let si=shields.length-1;si>=0;si--){
      const s=shields[si]; if(!s.alive)continue;
      if(bullets[i]&&bullets[i].x>=s.x&&bullets[i].x<=s.x+SS&&bullets[i].y>=s.y&&bullets[i].y<=s.y+SS){
        s.alive=false;bullets.splice(i,1);sh=true;break;
      }
    }
    if(sh)continue;
    let hit=false;
    for(let ei=enemies.length-1;ei>=0;ei--){
      const b=bullets[i]; if(!b)break;
      const e=enemies[ei];
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        const cx=e.x+e.w/2,cy=e.y+e.h/2;
        spawnParts(cx,cy,e.text===currentQ.a?"#00ff88":"#ff4444");
        spawnExplosion(cx,cy,isBossWave);
        checkAnswer(e.text,cx,cy);
        bullets.splice(i,1);hit=true;break;
      }
    }
    if(hit)return;
  }

  // Enemy movement
  let edge=false;
  enemies.forEach(e=>{
    e.x+=(isBossWave?enemySpeed*1.6:enemySpeed)*direction;
    e.pulse+=.06;
    if(e.x<10||e.x+e.w>890)edge=true;
  });
  if(edge){direction*=-1;enemies.forEach(e=>e.y+=(isBossWave?22:12)+level*1.5);}
  enemies.forEach(e=>{if(e.y+e.h>545)gameOverTrigger();});

  // Enemy bombs
  eBombTimer--;
  if(eBombTimer<=0&&enemies.length>0){
    const sh=enemies[Math.floor(Math.random()*enemies.length)];
    bombs.push({x:sh.x+sh.w/2,y:sh.y+sh.h,speed:3+level*.4});
    eBombTimer=Math.max(30,DIFF[difficulty].bombRate-level*4);
  }

  // Bombs
  for(let i=bombs.length-1;i>=0;i--){
    bombs[i].y+=bombs[i].speed;
    if(bombs[i].y>620){bombs.splice(i,1);continue;}
    let sh=false;
    for(let si=shields.length-1;si>=0;si--){
      const s=shields[si]; if(!s.alive)continue;
      if(bombs[i].x>=s.x&&bombs[i].x<=s.x+SS&&bombs[i].y>=s.y&&bombs[i].y<=s.y+SS){
        s.alive=false;bombs.splice(i,1);sh=true;break;
      }
    }
    if(sh)continue;
    const b=bombs[i]; if(!b)continue;
    if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h){
      bombs.splice(i,1); combo=0;
      if(shieldActive){
        shieldActive=false;
        spawnParts(player.x+22,player.y+9,"#4488ff",18);
        spawnFT(player.x+22,player.y-10,"ESCUDO ROTO","#4488ff",15);
        playTone(300,.2,"sine",.2);
      } else { loseLife(); }
    }
  }

  // Power-ups fall and collect
  if(rapidTimer>0) rapidTimer--;
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i]; p.y+=1.6; p.pulse+=.08;
    if(p.y>640){powerups.splice(i,1);continue;}
    if(p.x>player.x-10&&p.x<player.x+player.w+10&&p.y>player.y-10&&p.y<player.y+player.h+10){
      collectPowerup(p.type); powerups.splice(i,1);
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }

  if(flash!==0)flash+=flash>0?-1:1;
  shakeX*=.7; shakeY*=.7;
  updateStars();updateExplosions();updateFT();updateHearts();
}

// ── POWERUPS ──────────────────────────────────────────────────────────────────

];

// ── ANSWER ────────────────────────────────────────────────────────────────────
function checkAnswer(ans,hx=450,hy=200) {
  if(ans===currentQ.a) {
    combo++; if(combo>maxCombo)maxCombo=combo; statOK++;
    const mult=(combo>=5?3:combo>=3?2:1)*(x2Active?2:1);
    const pts=(10+level*5)*mult;
    if(x2Active){ x2Active=false; }
    score+=pts;
    spawnFT(hx,hy-10,mult>1?`+${pts} x${mult}`:`+${pts}`,mult>=6?"#dd44ff":mult>=3?"#ff4400":mult===2?"#ffaa00":"#ffff00");
    spawnPowerup(hx,hy);
    if(combo===3){sfxCombo();spawnFT(450,310,"COMBO x2!","#ffaa00",22);}
    if(combo===5){sfxCombo();spawnFT(450,310,"COMBO x3!","#ff4400",24);}
    // Bonus life
    if(score>=nextBonusLife){
      lives++;nextBonusLife+=300;flash=15;
      playTone(523,.1,"sine",.2);playTone(659,.1,"sine",.2);playTone(784,.15,"sine",.25);
      spawnParts(player.x+22,player.y+9,"#ff88ff",20);spawnHeart();
      spawnFT(hx,hy-35,"+VIDA","#ff88ff");
    }
    // Skin unlock check
    const prev=getBestScore();
    if(score>prev){
      for(const sk of SKINS){
        if(score>=sk.minBest&&prev<sk.minBest){
          skinMsg=`SKIN DESBLOQUEADA: ${sk.name}`;
          spawnFT(450,330,`SKIN: ${sk.name}!`,"#dd00ff",20);
          sfxSkin();
        }
      }
    }
    flash=8; sfxHit(); sfxLevelUp();
    levelUpTimer=55; levelUpNum=level+1;
    // Boss HP
    if(isBossWave){
      bossHp--;
      if(bossHp<=0){
        [450,330,570].forEach((x,i)=>setTimeout(()=>spawnExplosion(x,160+i*10,true),i*80));
        const bpts=100+level*20; score+=bpts;
        spawnFT(450,250,`BOSS +${bpts}`,"#ff4400",24); sfxBoss();
        level++; enemySpeed=Math.min(DIFF[difficulty].baseSpeed+level*.25,6);
        isBossWave=false; currentQ=pickQ(); spawnEnemies();
        if(level%5===0)startBossWave();
        qTimer=qTimerMax; return;
      }
      spawnFT(450,180,`BOSS HP: ${bossHp}/${bossMaxHp}`,"#ff6600",16);
    }
    level++; enemySpeed=Math.min(DIFF[difficulty].baseSpeed+level*.25,6);
    currentQ=pickQ(); spawnEnemies();
    if(level%5===0)startBossWave();
    qTimer=qTimerMax;
  } else {
    statNG++; combo=0;
    lastCorrect=currentQ.a; revealTimer=110;
    flash=-8; sfxMiss(); loseLife();
    if(state==="playing"){currentQ=pickQ();spawnEnemies();qTimer=qTimerMax;}
  }
}

function loseLife() {
  lives--;shakeX=10;shakeY=6;sfxBomb();
  spawnParts(player.x+22,player.y+9,"#ff4444",16);
  if(lives<=0)gameOverTrigger();
}

  lives=0;state="gameover";
  saveBestScore();saveScore();

    ctx.strokeStyle=`${nsk.color}55`; ctx.lineWidth=1; ctx.strokeRect(720,14,140,6);
    T(`SKIN: ${(prog*100)|0}%`,790,10,8,"#444","center");
    T(nsk.name,790,26,8,nsk.color,"center");
  } else {
    T("★ MAX SKIN",790,18,9,getActiveSkin().color,"center");
  }
  // Boss countdown (when not in boss wave)
  if(!isBossWave){
    const levsToBoss=5-(level%5===0?5:level%5);
    const col=levsToBoss<=1?"#ff4400":levsToBoss<=2?"#ffaa00":"#666";
    T(`BOSS EN: ${levsToBoss}`,790,34,8,col,"center");
  }
  // Question
  ctx.fillStyle="#fff";ctx.font="bold 19px 'Courier New',monospace";ctx.textAlign="center";
  ctx.fillText(currentQ.q,450,36);
  // Timer bar
  const tp=qTimer/qTimerMax;
  const tc=tp<.25?"#ff4400":tp<.5?"#ffaa00":"#00ffcc";
  ctx.fillStyle="#111";ctx.fillRect(200,56,500,7);
  ctx.fillStyle=tc;ctx.fillRect(200,56,500*tp,7);
  // Boss HP bar
  if(isBossWave&&bossHp>0){
    const bp=bossHp/bossMaxHp,bx=270,by=70,bw=360,bh=7;
    ctx.fillStyle="#220000";ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=`rgba(255,${40+80*bp|0},0,.9)`;ctx.fillRect(bx,by,bw*bp,bh);
    ctx.strokeStyle="#ff4400";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
    T(`BOSS: ${bossHp}/${bossMaxHp}`,450,84,10,"#ff6600");
  }
  // Dividers
  ctx.strokeStyle="rgba(0,255,204,.15)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,94);ctx.lineTo(900,94);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,555);ctx.lineTo(900,555);ctx.stroke();
}

function drawReveal() {
  if(revealTimer<=0) return;
  const a=Math.min(1,revealTimer/20);
  ctx.fillStyle=`rgba(120,0,0,${a*.65})`;ctx.fillRect(0,0,900,620);
  ctx.globalAlpha=a;
  ctx.fillStyle="#0a0000";ctx.strokeStyle="#ff4444";ctx.lineWidth=2;
  ctx.fillRect(190,255,520,95);ctx.strokeRect(190,255,520,95);
  T("INCORRECTO",450,282,13,"#ff6666");
  T(`CORRECTO ERA: ${lastCorrect}`,450,315,21,"#fff");
  ctx.globalAlpha=1;
}

function drawPause() {
  ctx.fillStyle="rgba(0,0,0,.78)";ctx.fillRect(0,0,900,620);
  T("PAUSA",450,285,52,"#00ffcc");
  T("P  →  CONTINUAR",450,340,14,"#555");
}

function drawGameOver() {
  ctx.fillStyle="rgba(0,0,0,.87)";ctx.fillRect(0,0,900,620);
  T("GAME OVER",450,100,46,"#ff4444");
  const prec=statOK+statNG>0?Math.round(statOK/(statOK+statNG)*100):0;
  T(`${statOK} CORRECTAS · ${statNG} ERRORES · ${prec}% PRECISIÓN`,450,138,11,"#666");
  if(skinMsg) T(skinMsg,450,156,11,"#dd00ff");
  // Stat boxes
  [{label:"PUNTOS",val:score,x:160},{label:"NIVEL",val:level,x:320},{label:"PRECISIÓN",val:prec+"%",x:480},{label:"COMBO MÁX",val:maxCombo>0?`x${Math.min(maxCombo>=5?3:maxCombo>=3?2:1,3)}`:"—",x:640}].forEach(b=>{
    ctx.fillStyle="rgba(0,28,18,.85)";ctx.strokeStyle="rgba(0,255,204,.2)";ctx.lineWidth=1;
    ctx.fillRect(b.x-65,168,130,56);ctx.strokeRect(b.x-65,168,130,56);
    T(b.label,b.x,191,9,"#555"); T(String(b.val),b.x,215,19,"#00ffcc");
  });
  // Ranking
  ctx.strokeStyle="rgba(0,255,204,.15)";ctx.lineWidth=1;ctx.strokeRect(250,240,400,250);
  T("— RANKING —",450,260,12,"#00ffcc");
  getScores().slice(0,7).forEach((d,i)=>{
    const me=d.name===playerName&&d.score===score;
    const col=me?"#ffff00":i===0?"#00ffcc":"#555";
    const dt={easy:"F",normal:"N",expert:"E"}[d.diff||"normal"];
    T(`${i+1}. ${d.name.slice(0,10).padEnd(10)} ${String(d.score).padStart(5)} LV${String(d.level).padStart(2)} [${dt}]`,450,284+i*26,11,col);
  });
  T("[ R ]  REINICIAR           [ M ]  MENÚ",450,506,13,"#444");
}

// ── DRAW MAIN ─────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,900,620);
  ctx.fillStyle="black";ctx.fillRect(0,0,900,620);
  drawStars();
  for(let y=0;y<620;y+=4){ctx.fillStyle="rgba(0,0,0,.18)";ctx.fillRect(0,y,900,1);}
  const sx=shakeX*(Math.random()-.5)*2,sy=shakeY*(Math.random()-.5)*2;
  ctx.save();ctx.translate(sx,sy);
  if(flash>0) {ctx.fillStyle=`rgba(0,255,100,${flash*.015})`;ctx.fillRect(-10,-10,920,640);}
  if(flash<0) {ctx.fillStyle=`rgba(255,50,50,${-flash*.018})`;ctx.fillRect(-10,-10,920,640);}
  drawShields();
  enemies.forEach(drawEnemy);
  ctx.fillStyle="#ffff00";
  bullets.forEach(b=>{ctx.fillRect(b.x-2,b.y,4,10);ctx.fillStyle="rgba(255,255,0,.3)";ctx.fillRect(b.x-3,b.y-2,6,14);ctx.fillStyle="#ffff00";});
  ctx.fillStyle="#ff6600";
  bombs.forEach(b=>{ctx.fillRect(b.x-2,b.y,4,8);ctx.fillStyle="rgba(255,100,0,.4)";ctx.fillRect(b.x-4,b.y-2,8,12);ctx.fillStyle="#ff6600";});
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);});
  ctx.globalAlpha=1;
  drawExplosions();drawFT();drawHearts();
  drawPlayer();
  drawHUD();
  ctx.restore();
  drawReveal();
  drawLevelUp();
  drawBossIntro();
  if(state==="paused")   drawPause();
  if(state==="gameover") drawGameOver();
}

// ── LOOP ──────────────────────────────────────────────────────────────────────
function loop(){update();draw();requestAnimationFrame(loop);}

// ── MENU ──────────────────────────────────────────────────────────────────────
function showMenu(){
  state="menu";
  document.getElementById("menu").style.display="block";
  canvas.style.display="none";
  updateTop3();
}
function startGame(){
  playerName=(document.getElementById("pname").value||"PLAYER").toUpperCase().slice(0,12);
  document.getElementById("menu").style.display="none";
  canvas.style.display="block";
  resetGame();state="playing";
}
document.getElementById("startBtn").addEventListener("click",()=>{initAudio();startGame();});
document.getElementById("pname").addEventListener("keydown",e=>{if(e.key==="Enter"){initAudio();startGame();}});

updateTop3();
setupMobile();
loop();
</script>
</body>
