<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Invaders — Expert Edition</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
}

canvas {
  background: #000;
  border: 2px solid #00ffcc;
  box-shadow: 0 0 30px rgba(0,255,204,0.4), inset 0 0 60px rgba(0,0,0,0.8);
  display: none;
  max-width: 100vw;
  max-height: 90vh;
}

#menu {
  color: #00ffcc;
  text-align: center;
  padding: 30px;
  border: 2px solid #00ffcc;
  box-shadow: 0 0 30px rgba(0,255,204,0.3);
  max-width: 420px;
  width: 90vw;
}

#menu h1 {
  font-size: clamp(24px, 5vw, 36px);
  letter-spacing: 6px;
  margin-bottom: 8px;
  text-shadow: 0 0 10px #00ffcc;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { text-shadow: 0 0 8px #00ffcc; }
  50% { text-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc; }
}

#menu p { color: #888; font-size: 13px; margin-bottom: 20px; letter-spacing: 2px; }

.menu-subtitle {
  font-size: 11px;
  color: #444;
  margin-bottom: 25px;
  letter-spacing: 1px;
}

input[type="text"] {
  background: #000;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  font-size: 16px;
  padding: 10px 14px;
  text-align: center;
  width: 200px;
  font-family: 'Courier New', monospace;
  letter-spacing: 3px;
  outline: none;
}
input[type="text"]:focus { box-shadow: 0 0 10px rgba(0,255,204,0.4); }

.btn {
  margin-top: 14px;
  padding: 11px 28px;
  background: #000;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  cursor: pointer;
  font-size: 15px;
  font-family: 'Courier New', monospace;
  letter-spacing: 3px;
  transition: all 0.15s;
  display: block;
  width: 200px;
  margin-left: auto;
  margin-right: auto;
}
.btn:hover {
  background: #00ffcc;
  color: #000;
  box-shadow: 0 0 15px rgba(0,255,204,0.5);
}

.controls-hint {
  margin-top: 25px;
  font-size: 11px;
  color: #333;
  line-height: 2;
  letter-spacing: 1px;
  border-top: 1px solid #111;
  padding-top: 15px;
}
.controls-hint span { color: #555; }

#mobile-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 90px;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.8);
  border-top: 1px solid #111;
  z-index: 10;
}

.mc-btn {
  background: rgba(0,255,204,0.08);
  border: 1px solid rgba(0,255,204,0.3);
  color: #00ffcc;
  font-size: 22px;
  width: 65px;
  height: 65px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.mc-btn:active { background: rgba(0,255,204,0.25); }

.mc-shoot {
  width: 80px;
  height: 65px;
  background: rgba(255,255,0,0.08);
  border-color: rgba(255,255,0,0.4);
  color: #ff0;
  font-size: 13px;
  letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="menu">
  <h1>IP INVADERS</h1>
  <p>EXPERT EDITION</p>
  <div class="menu-subtitle">REDES &amp; PROTOCOLOS</div>
  <input type="text" id="playerName" placeholder="PLAYER 1" maxlength="12">
  <button class="btn" id="startBtn">► START</button>
  <div class="controls-hint">
    <span>◄ ►</span> MOVER &nbsp;|&nbsp; <span>SPACE</span> DISPARAR<br>
    <span>P</span> PAUSA &nbsp;|&nbsp; <span>R</span> REINICIAR
  </div>
</div>

<canvas id="gameCanvas" width="900" height="620"></canvas>

<div id="mobile-controls">
  <button class="mc-btn" id="mc-left">◄</button>
  <button class="mc-shoot mc-btn" id="mc-shoot">FIRE</button>
  <button class="mc-btn" id="mc-right">►</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ─── AUDIO ────────────────────────────────────────────────────────────────────
let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = "square", vol = 0.15) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxShoot()   { playTone(700, 0.08, "square", 0.12); }
function sfxHit()     { playTone(1100,0.12,"sine",0.2); playTone(900,0.08,"sine",0.15); }
function sfxMiss()    { playTone(120, 0.3, "sawtooth", 0.18); }
function sfxBomb()    { playTone(80,  0.4, "sawtooth", 0.2); }
function sfxLevelUp() { [900,1100,1300].forEach((f,i)=>setTimeout(()=>playTone(f,0.12,"sine",0.2),i*80)); }

// ─── QUESTIONS ────────────────────────────────────────────────────────────────
const QUESTIONS = [
  // Privada / Pública / Loopback
  { q:"¿TIPO DE IP?: 192.168.1.50",    opts:["Privada","Pública","Loopback"], a:"Privada" },
  { q:"¿TIPO DE IP?: 10.0.0.1",        opts:["Privada","Pública","Loopback"], a:"Privada" },
  { q:"¿TIPO DE IP?: 172.16.10.2",     opts:["Privada","Pública","Loopback"], a:"Privada" },
  { q:"¿TIPO DE IP?: 172.31.255.1",    opts:["Privada","Pública","Loopback"], a:"Privada" },
  { q:"¿TIPO DE IP?: 8.8.8.8",         opts:["Privada","Pública","Loopback"], a:"Pública" },
  { q:"¿TIPO DE IP?: 1.1.1.1",         opts:["Privada","Pública","Loopback"], a:"Pública" },
  { q:"¿TIPO DE IP?: 45.23.1.8",       opts:["Privada","Pública","Loopback"], a:"Pública" },
  { q:"¿TIPO DE IP?: 200.200.200.1",   opts:["Privada","Pública","Loopback"], a:"Pública" },
  { q:"¿TIPO DE IP?: 127.0.0.1",       opts:["Privada","Pública","Loopback"], a:"Loopback" },
  { q:"¿TIPO DE IP?: 127.0.0.100",     opts:["Privada","Pública","Loopback"], a:"Loopback" },
  // Clases
  { q:"¿CLASE DE IP?: 10.20.30.40",    opts:["Clase A","Clase B","Clase C"], a:"Clase A" },
  { q:"¿CLASE DE IP?: 126.1.1.1",      opts:["Clase A","Clase B","Clase C"], a:"Clase A" },
  { q:"¿CLASE DE IP?: 15.0.0.1",       opts:["Clase A","Clase B","Clase C"], a:"Clase A" },
  { q:"¿CLASE DE IP?: 128.0.0.5",      opts:["Clase A","Clase B","Clase C"], a:"Clase B" },
  { q:"¿CLASE DE IP?: 172.31.2.1",     opts:["Clase A","Clase B","Clase C"], a:"Clase B" },
  { q:"¿CLASE DE IP?: 191.255.0.0",    opts:["Clase A","Clase B","Clase C"], a:"Clase B" },
  { q:"¿CLASE DE IP?: 192.168.1.1",    opts:["Clase A","Clase B","Clase C"], a:"Clase C" },
  { q:"¿CLASE DE IP?: 223.255.255.0",  opts:["Clase A","Clase B","Clase C"], a:"Clase C" },
  { q:"¿CLASE DE IP?: 200.10.10.1",    opts:["Clase A","Clase B","Clase C"], a:"Clase C" },
  // Máscaras
  { q:"¿MÁSCARA DE?: 10.0.0.1",        opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.0.0.0" },
  { q:"¿MÁSCARA DE?: 45.0.0.1",        opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.0.0.0" },
  { q:"¿MÁSCARA DE?: 172.16.0.1",      opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.255.0.0" },
  { q:"¿MÁSCARA DE?: 150.10.5.5",      opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.255.0.0" },
  { q:"¿MÁSCARA DE?: 192.168.10.10",   opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.255.255.0" },
  { q:"¿MÁSCARA DE?: 210.1.1.1",       opts:["255.0.0.0","255.255.0.0","255.255.255.0"], a:"255.255.255.0" },
  // CIDR (nuevas)
  { q:"¿CIDR EQUIVALE?: 255.0.0.0",    opts:["/8","/16","/24"], a:"/8" },
  { q:"¿CIDR EQUIVALE?: 255.255.0.0",  opts:["/8","/16","/24"], a:"/16" },
  { q:"¿CIDR EQUIVALE?: 255.255.255.0",opts:["/8","/16","/24"], a:"/24" },
  { q:"¿HOSTS EN /24?",                opts:["254","256","512"],  a:"254" },
  { q:"¿HOSTS EN /16?",                opts:["512","65534","1024"],a:"65534" },
  { q:"¿BITS EN IPv4?",                opts:["32","64","128"],    a:"32" },
  { q:"¿BITS EN IPv6?",                opts:["64","128","256"],   a:"128" },
  { q:"PROTOCOLO DNS USA PUERTO:",      opts:["53","80","443"],    a:"53" },
  { q:"PROTOCOLO HTTP USA PUERTO:",     opts:["80","8080","443"],  a:"80" },
  { q:"PROTOCOLO HTTPS USA PUERTO:",    opts:["443","80","8443"],  a:"443" },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = "menu"; // menu | playing | paused | gameover
let playerName = "PLAYER";

let player = { x: 430, y: 570, w: 44, h: 18, speed: 6 };
let bullets = [], bombs = [], enemies = [], shields = [], particles = [];
let direction = 1, enemySpeed = 1.0;
let score = 0, lives = 3, level = 1;
let nextBonusLife = 200;
let flash = 0, shakeX = 0, shakeY = 0;
let currentQ = QUESTIONS[0];
let enemyBombTimer = 120;
let usedQs = new Set();

// ─── STARS ────────────────────────────────────────────────────────────────────
let starsNear = [], starsFar = [];
function initStars() {
  starsNear = Array.from({length: 55}, () => ({
    x: Math.random() * 900, y: Math.random() * 620,
    size: 1.4 + Math.random() * 0.8, speed: 0.35 + Math.random() * 0.3,
    bright: 0.4 + Math.random() * 0.5
  }));
  starsFar = Array.from({length: 110}, () => ({
    x: Math.random() * 900, y: Math.random() * 620,
    size: 0.6 + Math.random() * 0.6, speed: 0.08 + Math.random() * 0.12,
    bright: 0.15 + Math.random() * 0.25
  }));
}
initStars();
function updateStars() {
  starsNear.forEach(s => { s.y += s.speed; if (s.y > 620) { s.y = -2; s.x = Math.random() * 900; } });
  starsFar.forEach(s => { s.y += s.speed; if (s.y > 620) { s.y = -2; s.x = Math.random() * 900; } });
}
function drawStars() {
  starsFar.forEach(s => {
    ctx.fillStyle = `rgba(160,190,255,${s.bright})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  starsNear.forEach(s => {
    ctx.fillStyle = `rgba(220,235,255,${s.bright})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
}

// ─── EXPLOSIONS ───────────────────────────────────────────────────────────────
let explosions = [];
function spawnExplosion(x, y) {
  explosions.push({ x, y, frame: 0, maxFrames: 20 });
}
function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    if (++explosions[i].frame >= explosions[i].maxFrames) explosions.splice(i, 1);
  }
}
function drawExplosions() {
  explosions.forEach(e => {
    const t = e.frame / e.maxFrames;
    const alpha = 1 - t;
    ctx.lineWidth = 2.5 * (1 - t * 0.5);
    ctx.strokeStyle = `rgba(255,210,0,${alpha * 0.9})`;
    ctx.beginPath(); ctx.arc(e.x, e.y, t * 55, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = `rgba(255,80,0,${alpha * 0.7})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(e.x, e.y, t * 32, 0, Math.PI * 2); ctx.stroke();
    for (let i = 0; i < 8; i++) {
      const angle = (Math.PI * 2 / 8) * i;
      const d = t * 48;
      ctx.fillStyle = `rgba(255,230,80,${alpha})`;
      ctx.fillRect(e.x + Math.cos(angle) * d - 2, e.y + Math.sin(angle) * d - 2, 4, 4);
    }
  });
}

// ─── FLOATING TEXTS ───────────────────────────────────────────────────────────
let floatingTexts = [];
function spawnFloatingText(x, y, text, color = "#ffff00") {
  floatingTexts.push({ x, y, text, color, life: 1, vy: -1.8 });
}
function updateFloatingTexts() {
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    floatingTexts[i].y += floatingTexts[i].vy;
    floatingTexts[i].life -= 0.028;
    if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
  }
}
function drawFloatingTexts() {
  floatingTexts.forEach(f => {
    ctx.globalAlpha = Math.max(0, f.life);
    ctx.fillStyle = f.color;
    ctx.font = `bold 19px 'Courier New', monospace`;
    ctx.textAlign = "center";
    ctx.fillText(f.text, f.x, f.y);
  });
  ctx.globalAlpha = 1;
}

// ─── BONUS HEARTS ─────────────────────────────────────────────────────────────
let bonusHearts = [];
function spawnBonusHeart() {
  bonusHearts.push({ x: 100 + Math.random() * 700, y: -35, vy: 2.2, life: 1, wobble: Math.random() * Math.PI * 2 });
}
function updateBonusHearts() {
  for (let i = bonusHearts.length - 1; i >= 0; i--) {
    const h = bonusHearts[i];
    h.y += h.vy; h.wobble += 0.08;
    h.x += Math.sin(h.wobble) * 0.8;
    if (h.y > 560) h.life -= 0.06;
    if (h.life <= 0) bonusHearts.splice(i, 1);
  }
}
function drawHeartShape(x, y, s, alpha) {
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.fillStyle = "#ff55aa";
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.35);
  ctx.bezierCurveTo(x, y + s * 0.05, x - s, y + s * 0.05, x - s, y + s * 0.35);
  ctx.bezierCurveTo(x - s, y + s * 0.65, x, y + s * 0.9, x, y + s);
  ctx.bezierCurveTo(x, y + s * 0.9, x + s, y + s * 0.65, x + s, y + s * 0.35);
  ctx.bezierCurveTo(x + s, y + s * 0.05, x, y + s * 0.05, x, y + s * 0.35);
  ctx.closePath(); ctx.fill();
  ctx.font = `bold 11px 'Courier New', monospace`;
  ctx.fillStyle = "#fff";
  ctx.textAlign = "center";
  ctx.fillText("+1", x, y + s * 0.7);
  ctx.globalAlpha = 1;
}
function drawBonusHearts() {
  bonusHearts.forEach(h => drawHeartShape(h.x, h.y, 16, h.life));
}

function resetGame() {
  player = { x: 430, y: 570, w: 44, h: 18, speed: 6 };
  bullets = []; bombs = []; enemies = []; particles = [];
  explosions = []; floatingTexts = []; bonusHearts = [];
  initStars();
  direction = 1;
  enemySpeed = 1.0;
  score = 0; lives = 3; level = 1;
  nextBonusLife = 200;
  flash = 0; shakeX = 0; shakeY = 0;
  enemyBombTimer = 0;
  usedQs = new Set();
  currentQ = pickQuestion();
  spawnEnemies();
  buildShields();
}

// ─── QUESTIONS ────────────────────────────────────────────────────────────────
function pickQuestion() {
  if (usedQs.size >= QUESTIONS.length) usedQs.clear();
  let idx;
  do { idx = Math.floor(Math.random() * QUESTIONS.length); }
  while (usedQs.has(idx));
  usedQs.add(idx);
  return QUESTIONS[idx];
}

// ─── ENEMIES ──────────────────────────────────────────────────────────────────
function spawnEnemies() {
  enemies = [];
  const opts = currentQ.opts;
  const totalW = opts.length * 160;
  const startX = (900 - totalW) / 2 + 10;
  opts.forEach((o, i) => {
    enemies.push({ x: startX + i * 160, y: 110, w: 145, h: 48, text: o, pulse: Math.random() * Math.PI * 2 });
  });
}

// ─── SHIELDS ──────────────────────────────────────────────────────────────────
const SHIELD_COLS = 8, SHIELD_ROWS = 3, SBSIZE = 10;
function buildShields() {
  shields = [];
  const positions = [160, 390, 620];
  positions.forEach(sx => {
    for (let r = 0; r < SHIELD_ROWS; r++) {
      for (let c = 0; c < SHIELD_COLS; c++) {
        shields.push({ x: sx + c * SBSIZE, y: 490 + r * SBSIZE, alive: true });
      }
    }
  });
}

// ─── INPUT ────────────────────────────────────────────────────────────────────
const keys = {};
let mobileFire = false;

document.addEventListener("keydown", e => {
  initAudio();
  keys[e.key] = true;
  if (e.key === " " && state === "playing") { e.preventDefault(); shoot(); }
  if ((e.key === "p" || e.key === "P") && state === "playing") state = "paused";
  else if ((e.key === "p" || e.key === "P") && state === "paused") state = "playing";
  if ((e.key === "r" || e.key === "R") && state === "gameover") showMenu();
});
document.addEventListener("keyup", e => keys[e.key] = false);

// Mobile controls
function setupMobile() {
  const isMobile = /Mobi|Android|Touch/i.test(navigator.userAgent) || window.innerWidth < 700;
  if (isMobile) document.getElementById("mobile-controls").style.display = "flex";

  const mcLeft  = document.getElementById("mc-left");
  const mcRight = document.getElementById("mc-right");
  const mcShoot = document.getElementById("mc-shoot");

  ["touchstart","mousedown"].forEach(ev => {
    mcLeft.addEventListener(ev,  e=>{e.preventDefault();keys["ArrowLeft"]=true;}, {passive:false});
    mcRight.addEventListener(ev, e=>{e.preventDefault();keys["ArrowRight"]=true;}, {passive:false});
    mcShoot.addEventListener(ev, e=>{e.preventDefault();initAudio();if(state==="playing")shoot();}, {passive:false});
  });
  ["touchend","mouseup"].forEach(ev => {
    mcLeft.addEventListener(ev,  ()=>keys["ArrowLeft"]=false);
    mcRight.addEventListener(ev, ()=>keys["ArrowRight"]=false);
  });
}

// ─── SHOOT ────────────────────────────────────────────────────────────────────
let shootCooldown = 0;
function shoot() {
  if (shootCooldown > 0) return;
  bullets.push({ x: player.x + 22, y: player.y - 2, speed: 9 });
  sfxShoot();
  shootCooldown = 12;
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.4;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (state !== "playing") return;
  if (shootCooldown > 0) shootCooldown--;

  // Player movement
  if (keys["ArrowLeft"])  player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;
  player.x = Math.max(2, Math.min(854, player.x));

  // Player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y -= bullets[i].speed;
    if (bullets[i].y < 0) { bullets.splice(i, 1); continue; }

    // Bullet vs shield
    let shieldHit = false;
    for (let si = shields.length - 1; si >= 0; si--) {
      const s = shields[si];
      if (!s.alive) continue;
      if (bullets[i] && bullets[i].x >= s.x && bullets[i].x <= s.x + SBSIZE &&
          bullets[i].y >= s.y && bullets[i].y <= s.y + SBSIZE) {
        s.alive = false;
        bullets.splice(i, 1);
        shieldHit = true;
        break;
      }
    }
    if (shieldHit) continue;

    // Bullet vs enemy
    let hit = false;
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const b = bullets[i];
      if (!b) break;
      const e = enemies[ei];
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        const cx = e.x + e.w / 2, cy = e.y + e.h / 2;
        spawnParticles(cx, cy, e.text === currentQ.a ? "#00ff88" : "#ff4444");
        spawnExplosion(cx, cy);
        checkAnswer(e.text, cx, cy);
        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
    if (hit) return; // respawn happens, restart loop
  }

  // Enemy movement
  let hitEdge = false;
  enemies.forEach(e => {
    e.x += enemySpeed * direction;
    e.pulse += 0.06;
    if (e.x < 10 || e.x + e.w > 890) hitEdge = true;
  });
  if (hitEdge) {
    direction *= -1;
    enemies.forEach(e => e.y += 12 + level * 1.5);
  }

  // Enemies reach player zone
  enemies.forEach(e => {
    if (e.y + e.h > 545) {
      gameOverTrigger();
    }
  });

  // Enemy bombs
  enemyBombTimer--;
  if (enemyBombTimer <= 0 && enemies.length > 0) {
    const shooter = enemies[Math.floor(Math.random() * enemies.length)];
    bombs.push({ x: shooter.x + shooter.w / 2, y: shooter.y + shooter.h, speed: 3 + level * 0.4 });
    enemyBombTimer = Math.max(40, 120 - level * 8);
  }

  // Bombs update
  for (let i = bombs.length - 1; i >= 0; i--) {
    bombs[i].y += bombs[i].speed;
    if (bombs[i].y > 620) { bombs.splice(i, 1); continue; }

    // Bomb vs shield
    let shieldHit = false;
    for (let si = shields.length - 1; si >= 0; si--) {
      const s = shields[si];
      if (!s.alive) continue;
      if (bombs[i].x >= s.x && bombs[i].x <= s.x + SBSIZE &&
          bombs[i].y >= s.y && bombs[i].y <= s.y + SBSIZE) {
        s.alive = false;
        bombs.splice(i, 1);
        shieldHit = true;
        break;
      }
    }
    if (shieldHit) continue;

    // Bomb vs player
    const b = bombs[i];
    if (!b) continue;
    if (b.x > player.x && b.x < player.x + player.w &&
        b.y > player.y && b.y < player.y + player.h) {
      bombs.splice(i, 1);
      loseLife();
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05; // gravity
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Flash & shake decay
  if (flash !== 0) flash += flash > 0 ? -1 : 1;
  shakeX *= 0.7; shakeY *= 0.7;
  updateStars();
  updateExplosions();
  updateFloatingTexts();
  updateBonusHearts();
}

// ─── ANSWER LOGIC ─────────────────────────────────────────────────────────────
function checkAnswer(ans, hitX = 450, hitY = 200) {
  if (ans === currentQ.a) {
    const pts = 10 + level * 5;
    score += pts;
    spawnFloatingText(hitX, hitY - 10, `+${pts}`, "#ffff00");
    if (score >= nextBonusLife) {
      lives++;
      nextBonusLife += 300;
      flash = 15;
      playTone(523,0.1,"sine",0.2); playTone(659,0.1,"sine",0.2); playTone(784,0.15,"sine",0.25);
      spawnParticles(player.x + 22, player.y + 9, "#ff88ff", 20);
      spawnBonusHeart();
      spawnFloatingText(hitX, hitY - 35, `+VIDA`, "#ff88ff");
    }
    flash = 8;
    sfxHit();
    sfxLevelUp();
    level++;
    enemySpeed = Math.min(1.0 + level * 0.3, 6);
    currentQ = pickQuestion();
    spawnEnemies();
  } else {
    flash = -8;
    sfxMiss();
    loseLife();
    currentQ = pickQuestion();
    spawnEnemies();
  }
}

function loseLife() {
  lives--;
  shakeX = 10; shakeY = 6;
  sfxBomb();
  spawnParticles(player.x + 22, player.y + 9, "#ff4444", 16);
  if (lives <= 0) gameOverTrigger();
}

function gameOverTrigger() {
  lives = 0;
  state = "gameover";
  saveScore();
  spawnParticles(player.x + 22, player.y + 9, "#ff8800", 30);
}

// ─── HIGH SCORES ──────────────────────────────────────────────────────────────
function saveScore() {
  try {
    let data = JSON.parse(localStorage.getItem("ipInvaders_v2") || "[]");
    data.push({ name: playerName, score, level });
    data.sort((a, b) => b.score - a.score);
    data = data.slice(0, 8);
    localStorage.setItem("ipInvaders_v2", JSON.stringify(data));
  } catch(e) {}
}
function getScores() {
  try { return JSON.parse(localStorage.getItem("ipInvaders_v2") || "[]"); }
  catch(e) { return []; }
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function txt(t, x, y, size = 16, color = "#0f0", align = "center") {
  ctx.fillStyle = color;
  ctx.font = `${size}px 'Courier New', monospace`;
  ctx.textAlign = align;
  ctx.fillText(t, x, y);
}

function drawPlayer() {
  const x = player.x, y = player.y;
  ctx.fillStyle = "#00ffcc";
  // Ship body
  ctx.fillRect(x + 14, y, 16, 6);
  ctx.fillRect(x + 6,  y + 6, 32, 6);
  ctx.fillRect(x,      y + 12, 44, 6);
  // Cannon tip
  ctx.fillStyle = "#00ffee";
  ctx.fillRect(x + 20, y - 5, 4, 5);
}

function drawEnemy(e) {
  const pulse = 0.5 + 0.5 * Math.sin(e.pulse);
  const glow = Math.floor(80 + 175 * pulse);
  ctx.strokeStyle = `rgba(0,${glow},${glow},0.85)`;
  ctx.lineWidth = 1.5;
  ctx.strokeRect(e.x, e.y, e.w, e.h);

  ctx.fillStyle = `rgba(0,${glow},${glow},${0.04 + 0.03 * pulse})`;
  ctx.fillRect(e.x, e.y, e.w, e.h);

  // Enemy sprite
  const cx = e.x + e.w / 2;
  ctx.fillStyle = `rgba(0,${glow},${glow},0.6)`;
  ctx.fillRect(cx - 10, e.y + 6,  4, 4);
  ctx.fillRect(cx + 6,  e.y + 6,  4, 4);
  ctx.fillRect(cx - 6,  e.y + 10, 12, 3);
  ctx.fillRect(cx - 14, e.y + 10, 4, 3);
  ctx.fillRect(cx + 10, e.y + 10, 4, 3);

  // Text label
  ctx.fillStyle = "#00ffcc";
  ctx.font = "13px 'Courier New', monospace";
  ctx.textAlign = "center";
  ctx.fillText(e.text, e.x + e.w / 2, e.y + e.h - 8);
}

function drawShields() {
  ctx.fillStyle = "#00aa66";
  shields.forEach(s => {
    if (s.alive) ctx.fillRect(s.x, s.y, SBSIZE - 1, SBSIZE - 1);
  });
}

function drawHUD() {
  // Top bar
  ctx.fillStyle = "rgba(0,20,15,0.7)";
  ctx.fillRect(0, 0, 900, 90);

  txt(playerName, 14, 22, 14, "#00ffcc", "left");
  txt("SCORE: " + score,  14, 42, 14, "#0f0", "left");
  txt("LIVES: " + "♥".repeat(lives) + "♡".repeat(Math.max(0, 3 - lives)), 14, 62, 14, "#f44", "left");
  txt("LVL: " + level, 14, 80, 12, "#888", "left");

  // Question
  ctx.fillStyle = "#fff";
  ctx.font = "bold 20px 'Courier New', monospace";
  ctx.textAlign = "center";
  ctx.fillText(currentQ.q, 450, 38);

  // Divider line
  ctx.strokeStyle = "rgba(0,255,204,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 90); ctx.lineTo(900, 90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 555); ctx.lineTo(900, 555); ctx.stroke();
}

function drawPause() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0, 0, 900, 620);
  txt("PAUSE", 450, 290, 50, "#00ffcc");
  txt("Pulsa P para continuar", 450, 340, 16, "#555");
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.82)";
  ctx.fillRect(0, 0, 900, 620);

  txt("GAME OVER", 450, 160, 48, "#ff4444");
  txt(`${playerName}  ·  SCORE: ${score}  ·  NIVEL: ${level}`, 450, 205, 14, "#888");

  // Scoreboard
  ctx.strokeStyle = "rgba(0,255,204,0.2)";
  ctx.lineWidth = 1;
  ctx.strokeRect(270, 230, 360, 250);

  txt("— HIGH SCORES —", 450, 258, 13, "#00ffcc");
  const data = getScores();
  data.forEach((d, i) => {
    const isMe = d.name === playerName && d.score === score;
    const color = isMe ? "#ffff00" : (i === 0 ? "#00ffcc" : "#666");
    txt(`${i + 1}.  ${d.name.padEnd(12)}  ${String(d.score).padStart(6)}  LV${d.level}`, 450, 282 + i * 24, 12, color);
  });

  txt("[ R ] REINICIAR    [ M ] MENÚ", 450, 490, 14, "#444");
}

// ─── MAIN DRAW ────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, 900, 620);

  // Scanlines
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, 900, 620);
  drawStars();
  for (let y = 0; y < 620; y += 4) {
    ctx.fillStyle = "rgba(0,0,0,0.18)";
    ctx.fillRect(0, y, 900, 1);
  }

  // Screen shake
  const sx = shakeX * (Math.random() - 0.5) * 2;
  const sy = shakeY * (Math.random() - 0.5) * 2;
  ctx.save();
  ctx.translate(sx, sy);

  // Flash overlay
  if (flash > 0) {
    ctx.fillStyle = `rgba(0,255,100,${flash * 0.015})`;
    ctx.fillRect(-10, -10, 920, 640);
  }
  if (flash < 0) {
    ctx.fillStyle = `rgba(255,50,50,${-flash * 0.018})`;
    ctx.fillRect(-10, -10, 920, 640);
  }

  drawShields();

  // Enemies
  enemies.forEach(drawEnemy);

  // Player bullets
  ctx.fillStyle = "#ffff00";
  bullets.forEach(b => {
    ctx.fillRect(b.x - 2, b.y, 4, 10);
    ctx.fillStyle = "rgba(255,255,0,0.3)";
    ctx.fillRect(b.x - 3, b.y - 2, 6, 14);
    ctx.fillStyle = "#ffff00";
  });

  // Enemy bombs
  ctx.fillStyle = "#ff6600";
  bombs.forEach(b => {
    ctx.fillRect(b.x - 2, b.y, 4, 8);
    ctx.fillStyle = "rgba(255,100,0,0.4)";
    ctx.fillRect(b.x - 4, b.y - 2, 8, 12);
    ctx.fillStyle = "#ff6600";
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  drawExplosions();
  drawFloatingTexts();
  drawBonusHearts();

  drawPlayer();
  drawHUD();

  ctx.restore();

  if (state === "paused") drawPause();
  if (state === "gameover") drawGameOver();
}

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ─── MENU / START ─────────────────────────────────────────────────────────────
function showMenu() {
  state = "menu";
  document.getElementById("menu").style.display = "block";
  canvas.style.display = "none";
}

function startGame() {
  playerName = (document.getElementById("playerName").value || "PLAYER").toUpperCase().slice(0, 12);
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  resetGame();
  state = "playing";
}

document.getElementById("startBtn").addEventListener("click", () => { initAudio(); startGame(); });
document.getElementById("playerName").addEventListener("keydown", e => {
  if (e.key === "Enter") { initAudio(); startGame(); }
});

// Restart & menu from gameover
document.addEventListener("keydown", e => {
  if (e.key === "m" || e.key === "M") {
    if (state === "gameover") showMenu();
  }
});

setupMobile();
loop();
</script>
